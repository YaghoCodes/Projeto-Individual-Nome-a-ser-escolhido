<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/styleLogin.css">
    <title>Cadastro</title>
</head>

<body>
    <div class="container-main">
        <h1 class="logo"><span class="texto-azul">Check</span>Point</h1>
        <h2>CADASTRAR</h2>
        <h3>Entre na <span class="texto-azul">comunidade</span></h3>
        <p>Crie sua conta e organize todos os jogos que você ama em um só lugar.</p>

        <div class="box-cadastro">
            <form>
                <label for="email">EMAIL</label>
                <input type="email" id="email" placeholder="voce@email.com">

                <label for="senha">SENHA</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres">

                <button type="submit" class="btn-cadastrar">Criar conta</button>

            </form>
        </div>
        <p class="login-link">Já tem uma conta? <a href="Login.html">Entrar</a></p>
    </div>
</body>

</html>
