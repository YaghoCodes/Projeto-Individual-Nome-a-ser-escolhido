<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base dark background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#02000f"/>
    </radialGradient>

    <!-- Purple nebula center -->
    <radialGradient id="nebula1" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#3b1a6e" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#1e0a45" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#02000f" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue glow left -->
    <radialGradient id="glow1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0d2a5e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#02000f" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue glow right -->
    <radialGradient id="glow2" cx="80%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#0a1e4a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#02000f" stop-opacity="0"/>
    </radialGradient>

    <!-- Cyan highlight top center -->
    <radialGradient id="glow3" cx="55%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#4A9EDB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#02000f" stop-opacity="0"/>
    </radialGradient>

    <!-- Noise filter for nebula texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="soft-light" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Blur for soft glows -->
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1440" height="900" fill="url(#bgGrad)"/>

  <!-- Nebula layers -->
  <rect width="1440" height="900" fill="url(#nebula1)"/>
  <rect width="1440" height="900" fill="url(#glow1)"/>
  <rect width="1440" height="900" fill="url(#glow2)"/>
  <rect width="1440" height="900" fill="url(#glow3)"/>

  <!-- Nebula cloud shapes -->
  <g filter="url(#blur-lg)" opacity="0.6">
    <ellipse cx="720" cy="260" rx="480" ry="280" fill="#2a0d5e" opacity="0.5"/>
    <ellipse cx="580" cy="200" rx="320" ry="200" fill="#1a0840" opacity="0.6"/>
    <ellipse cx="860" cy="300" rx="280" ry="180" fill="#0d1a5a" opacity="0.5"/>
  </g>

  <!-- Additional soft glow blobs -->
  <g filter="url(#blur-lg)" opacity="0.4">
    <ellipse cx="200" cy="400" rx="260" ry="200" fill="#0a2060" opacity="0.7"/>
    <ellipse cx="1200" cy="500" rx="220" ry="180" fill="#0d1850" opacity="0.6"/>
    <ellipse cx="720" cy="150" rx="300" ry="150" fill="#4A9EDB" opacity="0.08"/>
  </g>

  <!-- Stars layer - tiny dots -->
  <g opacity="0.9">
    <!-- Bright stars -->
    <circle cx="120" cy="80" r="1.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="340" cy="45" r="0.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="560" cy="120" r="1.5" fill="#c8e6ff" opacity="0.8"/>
    <circle cx="780" cy="60" r="0.9" fill="#ffffff" opacity="0.6"/>
    <circle cx="1000" cy="90" r="1.3" fill="#ffffff" opacity="0.85"/>
    <circle cx="1200" cy="40" r="0.7" fill="#c8e6ff" opacity="0.7"/>
    <circle cx="1380" cy="110" r="1.1" fill="#ffffff" opacity="0.75"/>
    <circle cx="60" cy="200" r="0.9" fill="#ffffff" opacity="0.6"/>
    <circle cx="280" cy="170" r="1.4" fill="#aad4ff" opacity="0.8"/>
    <circle cx="450" cy="250" r="0.7" fill="#ffffff" opacity="0.5"/>
    <circle cx="680" cy="180" r="1.0" fill="#ffffff" opacity="0.7"/>
    <circle cx="900" cy="220" r="0.8" fill="#c8e6ff" opacity="0.65"/>
    <circle cx="1100" cy="160" r="1.2" fill="#ffffff" opacity="0.8"/>
    <circle cx="1320" cy="200" r="0.9" fill="#ffffff" opacity="0.6"/>
    <circle cx="160" cy="350" r="0.7" fill="#aad4ff" opacity="0.55"/>
    <circle cx="380" cy="380" r="1.1" fill="#ffffff" opacity="0.7"/>
    <circle cx="820" cy="400" r="0.8" fill="#ffffff" opacity="0.5"/>
    <circle cx="1050" cy="350" r="1.3" fill="#c8e6ff" opacity="0.75"/>
    <circle cx="1260" cy="330" r="0.7" fill="#ffffff" opacity="0.6"/>
    <circle cx="90" cy="500" r="0.9" fill="#ffffff" opacity="0.5"/>
    <circle cx="310" cy="520" r="0.6" fill="#c8e6ff" opacity="0.55"/>
    <circle cx="530" cy="480" r="1.0" fill="#ffffff" opacity="0.65"/>
    <circle cx="1150" cy="490" r="0.8" fill="#aad4ff" opacity="0.6"/>
    <circle cx="1400" cy="450" r="1.1" fill="#ffffff" opacity="0.7"/>
    <circle cx="200" cy="620" r="0.7" fill="#ffffff" opacity="0.45"/>
    <circle cx="700" cy="580" r="0.9" fill="#c8e6ff" opacity="0.55"/>
    <circle cx="950" cy="620" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="1300" cy="600" r="1.0" fill="#aad4ff" opacity="0.65"/>
    <circle cx="50" cy="700" r="0.8" fill="#ffffff" opacity="0.4"/>
    <circle cx="420" cy="720" r="1.2" fill="#ffffff" opacity="0.6"/>
    <circle cx="1100" cy="750" r="0.7" fill="#c8e6ff" opacity="0.5"/>
    <circle cx="1440" cy="680" r="0.9" fill="#ffffff" opacity="0.55"/>
    <!-- Extra scattered stars -->
    <circle cx="650" cy="30" r="0.6" fill="#ffffff" opacity="0.5"/>
    <circle cx="1050" cy="70" r="0.8" fill="#aad4ff" opacity="0.6"/>
    <circle cx="1450" cy="300" r="0.7" fill="#ffffff" opacity="0.55"/>
    <circle cx="730" cy="800" r="0.9" fill="#c8e6ff" opacity="0.45"/>
    <circle cx="175" cy="810" r="0.6" fill="#ffffff" opacity="0.4"/>
    <circle cx="980" cy="840" r="0.8" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Glowing star clusters -->
  <g filter="url(#blur-sm)">
    <circle cx="560" cy="120" r="3" fill="#4A9EDB" opacity="0.4"/>
    <circle cx="1000" cy="90" r="2.5" fill="#6ab8f7" opacity="0.35"/>
    <circle cx="280" cy="170" r="2.8" fill="#4A9EDB" opacity="0.3"/>
  </g>

  <!-- Noise texture overlay for depth -->
  <rect width="1440" height="900" fill="url(#bgGrad)" filter="url(#noise)" opacity="0.08"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#02000f" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>
